<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Lib Thachang - แหล่งเรียนรู้ท่าฉาง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fdf2f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #fee2e2; }
        .hidden { display: none; }
        .btn-purple { background: #9333ea; color: white; transition: 0.3s; }
        .btn-purple:hover { background: #7e22ce; transform: scale(1.02); }
    </style>
</head>
<body class="text-gray-800 min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center border-b-8 border-purple-600">
            <div class="text-5xl mb-4">📖</div>
            <h1 class="text-3xl font-bold text-purple-700 mb-1">V Lib Thachang</h1>
            <p class="text-gray-500 mb-8">อ่าน เรียนรู้ และสะสมแต้ม</p>
            
            <input type="email" id="email" placeholder="อีเมลของคุณ" class="w-full mb-4 p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-purple-400">
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full mb-6 p-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-purple-400">
            
            <button onclick="handleLogin()" class="w-full btn-purple font-bold py-4 rounded-2xl mb-4 shadow-lg text-lg">เข้าสู่ระบบ</button>
            <button onclick="handleRegister()" class="text-purple-600 font-semibold">สร้างบัญชีใหม่</button>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <nav class="glass sticky top-0 z-50 p-4 shadow-md flex justify-between items-center px-6 md:px-12">
            <h2 class="font-bold text-purple-700 text-2xl tracking-tight">V Lib Thachang</h2>
            <div class="flex items-center gap-4">
                <div id="points-display" class="bg-yellow-400 text-white px-5 py-2 rounded-full font-bold shadow-sm">🪙 0 แต้ม</div>
                <button onclick="auth.signOut()" class="text-red-500 font-bold px-3 py-1 rounded-lg bg-red-50">ออก</button>
            </div>
        </nav>
        
        <main class="max-w-6xl mx-auto p-6">
            <div class="bg-gradient-to-br from-purple-600 to-pink-500 rounded-[2.5rem] p-10 mb-10 text-white shadow-xl flex flex-col md:flex-row justify-between items-center">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-bold mb-2">เกมแฟนพันธุ์แท้ V Lib 🎮</h1>
                    <p class="opacity-90">ตอบคำถาม 10 ข้อ รับทันที 50 แต้ม!</p>
                </div>
                <button onclick="startQuiz()" class="mt-6 md:mt-0 bg-white text-purple-600 font-bold px-10 py-4 rounded-2xl shadow-lg hover:bg-yellow-400 hover:text-white transition">เริ่มเล่นเลย</button>
            </div>

            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-gray-700">📖 หนังสือแนะนำ</h2>
                <button onclick="showRedeem()" class="text-purple-600 font-bold bg-white px-4 py-2 rounded-xl shadow-sm border border-purple-100">🎁 แลกของรางวัล</button>
            </div>
            
            <div id="book-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                </div>
        </main>
    </div>

    <div id="content-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="glass w-full max-w-3xl max-h-[85vh] overflow-y-auto p-10 rounded-[3rem] shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-3xl text-gray-400 hover:text-red-500">&times;</button>
            <div id="modal-body" class="prose prose-purple max-w-none">
                </div>
            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <button id="claim-btn" class="w-full bg-green-500 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-green-600 transition text-xl">
                    อ่านจบแล้ว กดรับแต้มสะสม
                </button>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90">
        <div class="glass w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl text-center">
            <p id="q-count" class="text-purple-600 font-bold mb-2">ข้อที่ 1/10</p>
            <h2 id="q-text" class="text-2xl font-bold mb-8 text-gray-800 leading-snug">คำถาม...</h2>
            <div id="q-options" class="flex flex-col gap-4"></div>
        </div>
    </div>

    <script>
        // ใส่ Firebase Config เดิมของคุณที่นี่
        const firebaseConfig = {
            apiKey: "AIzaSyAR2-lI9YULz5J0OZNBcKk_oJYtJANX8XA",
            authDomain: "thachang-library.firebaseapp.com",
            databaseURL: "https://thachang-library-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thachang-library",
            storageBucket: "thachang-library.firebasestorage.app",
            messagingSenderId: "172018694224",
            appId: "1:172018694224:web:e1c58a5836f849496db955"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ข้อมูลหนังสือ 5 เล่มแบบเจาะลึก
        const BOOKS = [
            { id: 1, title: "ตำนานฉางข้าวหลวง", cover: "🏛️", pts: 40, desc: "เจาะลึกประวัติศาสตร์ชื่อท่าฉาง", text: "<h2>🏛️ ความลับของชื่อ 'ท่าฉาง'</h2><p>ในสมัยรัตนโกสินทร์ตอนต้น พื้นที่ริมแม่น้ำพุมดวงแห่งนี้เป็นที่ตั้งของ <b>'ฉางข้าวหลวง'</b> เพื่อเก็บรวบรวมข้าวจากชาวบ้านส่งเข้าเมืองหลวง ชื่ออำเภอจึงกลายเป็น 'ท่าฉาง' ตั้งแต่นั้นเป็นต้นมาครับ</p>" },
            { id: 2, title: "ลุ่มน้ำพุมดวง", cover: "🌊", pts: 35, desc: "สายน้ำหลักที่หล่อเลี้ยงชาวท่าฉาง", text: "<h2>🌊 แม่น้ำพุมดวง</h2><p>เป็นแม่น้ำสายสำคัญที่มีต้นกำเนิดจากเทือกเขาตะนาวศรี ไหลผ่านอำเภอท่าฉางสู่ทะเล อุดมไปด้วยสัตว์น้ำและเป็นเส้นทางคมนาคมหลักในอดีต</p>" },
            { id: 3, title: "กะปิท่าฉาง GI", cover: "🦐", pts: 45, desc: "ภูมิปัญญาการทำกะปิจากตัวเคย", text: "<h2>🦐 กะปิหอมท่าฉาง</h2><p>กะปิที่นี่ใช้ 'ตัวเคย' สดๆ จากแหล่งน้ำกร่อย หมักด้วยสูตรโบราณจนได้กลิ่นหอมและรสชาติที่เป็นเอกลักษณ์ จนได้รับการขึ้นทะเบียนเป็นสินค้า GI ครับ</p>" },
            { id: 4, title: "วัดเขาพระ", cover: "🛕", pts: 30, desc: "ศรัทธาและความเชื่อบนยอดเขา", text: "<h2>🛕 ปูชนียสถานสำคัญ</h2><p>วัดเขาพระเป็นที่ประดิษฐานรอยพระพุทธบาทจำลอง และเป็นจุดชมวิวที่สวยที่สุดของอำเภอ เป็นศูนย์รวมจิตใจของชาวท่าฉางมาอย่างยาวนาน</p>" },
            { id: 5, title: "มรดกมโนราห์", cover: "🎭", pts: 50, desc: "ศิลปะการแสดงภาคใต้ที่ UNESCO รับรอง", text: "<h2>🎭 ศิลป์แผ่นดินท่าฉาง</h2><p>การรำมโนราห์ในท่าฉางยังคงเอกลักษณ์ความอ่อนช้อยและการขับร้องสดที่หาชมได้ยาก เป็นมรดกทางวัฒนธรรมที่สืบทอดจากรุ่นสู่รุ่น</p>" }
        ];

        // คำถามเกม 10 ข้อ
        const QUESTIONS = [
            { q: "ชื่อ 'ท่าฉาง' มาจากสิ่งใด?", a: ["ฉางเก็บข้าวหลวง", "ท่าจอดรถฉาง"], c: 0 },
            { q: "แม่น้ำสายหลักคือแม่น้ำอะไร?", a: ["แม่น้ำพุมดวง", "แม่น้ำตาปี"], c: 0 },
            { q: "กะปิท่าฉางทำมาจากสัตว์ชนิดใด?", a: ["ตัวเคย", "กุ้งก้ามกราม"], c: 0 },
            { q: "วัดใดตั้งอยู่บนยอดเขาและมีรอยพระพุทธบาท?", a: ["วัดเขาพระ", "วัดพระบรมธาตุ"], c: 0 },
            { q: "สินค้า GI ขึ้นชื่อของท่าฉางคืออะไร?", a: ["กะปิ", "ส้มโอ"], c: 0 },
            { q: "มโนราห์ได้รับการรับรองจากหน่วยงานใด?", a: ["UNESCO", "UNICEF"], c: 0 },
            { q: "ในอดีตฉางข้าวหลวงตั้งอยู่ริมแม่น้ำสายใด?", a: ["แม่น้ำพุมดวง", "แม่น้ำตาปี"], c: 0 },
            { q: "ตัวเคย พบมากในแหล่งน้ำชนิดใด?", a: ["น้ำกร่อย", "น้ำจืดสนิท"], c: 0 },
            { q: "ท่าฉางตั้งอยู่ในจังหวัดใด?", a: ["สุราษฎร์ธานี", "กระบี่"], c: 0 },
            { q: "การสะสมแต้มใน V Lib ทำได้โดยวิธีใด?", a: ["อ่านหนังสือและเล่นเกม", "นอนหลับ"], c: 0 }
        ];

        let curQ = 0, score = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    document.getElementById('points-display').innerText = `🪙 ${s.val()?.points || 0} แต้ม`;
                });
                renderBooks();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        function renderBooks() {
            document.getElementById('book-grid').innerHTML = BOOKS.map(b => `
                <div class="glass p-6 rounded-[2rem] shadow-lg flex flex-col justify-between hover:scale-105 transition duration-300">
                    <div>
                        <div class="text-6xl mb-4">${b.cover}</div>
                        <h3 class="text-xl font-bold mb-2">${b.title}</h3>
                        <p class="text-gray-500 text-sm mb-6">${b.desc}</p>
                    </div>
                    <button onclick="openBook(${b.id})" class="w-full btn-purple font-bold py-3 rounded-xl shadow-md">อ่านรับ +${b.pts} แต้ม</button>
                </div>
            `).join('');
        }

        function openBook(id) {
            const b = BOOKS.find(x => x.id === id);
            document.getElementById('modal-body').innerHTML = b.text;
            document.getElementById('claim-btn').onclick = () => {
                db.ref('users/' + auth.currentUser.uid + '/points').transaction(c => (c || 0) + b.pts);
                alert(`🎊 สำเร็จ! คุณได้รับ ${b.pts} แต้ม`);
                closeModal();
            };
            document.getElementById('content-modal').classList.remove('hidden');
        }

        function startQuiz() {
            curQ = 0; score = 0;
            document.getElementById('quiz-modal').classList.remove('hidden');
            showQ();
        }

        function showQ() {
            const q = QUESTIONS[curQ];
            document.getElementById('q-count').innerText = `ข้อที่ ${curQ + 1}/10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-options').innerHTML = q.a.map((o, i) => `
                <button onclick="ans(${i})" class="w-full bg-white border-2 border-purple-100 py-4 rounded-2xl font-bold hover:bg-purple-600 hover:text-white transition shadow-sm text-lg">${o}</button>
            `).join('');
        }

        function ans(i) {
            if (i === QUESTIONS[curQ].c) score++;
            curQ++;
            if (curQ < 10) showQ();
            else {
                if (score === 10) {
                    db.ref('users/' + auth.currentUser.uid + '/points').transaction(c => (c || 0) + 50);
                    alert("🏆 สุดยอด! คุณตอบถูกหมด รับ 50 แต้ม!");
                } else alert(`คุณได้ ${score} คะแนน พยายามใหม่นะ!`);
                document.getElementById('quiz-modal').classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('content-modal').classList.add('hidden'); }
        async function handleLogin() {
            try { await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value); } 
            catch(e) { alert("ข้อมูลไม่ถูกต้อง"); }
        }
        async function handleRegister() {
            try {
                const r = await auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                await db.ref('users/' + r.user.uid).set({ points: 0 });
                alert("สมัครสำเร็จ!");
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
