<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท่าฉาง Library - สะสมแต้มอ่านหนังสือ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="text-gray-800 min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-4xl font-bold text-purple-700 mb-2">📚 ท่าฉาง Library</h1>
            <p class="text-pink-500 mb-8">อ่านหนังสือวันนี้ เพื่อแต้มในวันหน้า</p>
            <input type="email" id="email" placeholder="อีเมล" class="w-full mb-4 p-4 rounded-2xl border border-purple-100 focus:ring-2 focus:ring-purple-400 outline-none">
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full mb-6 p-4 rounded-2xl border border-purple-100 focus:ring-2 focus:ring-purple-400 outline-none">
            <button onclick="handleLogin()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-2xl mb-3 shadow-lg hover:bg-purple-700 transition-all">เข้าสู่ระบบ</button>
            <button onclick="handleRegister()" class="w-full border-2 border-purple-600 text-purple-600 font-bold py-4 rounded-2xl hover:bg-purple-50 transition-all">สมัครสมาชิกใหม่</button>
            <p id="auth-msg" class="text-red-500 text-sm mt-4"></p>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <nav class="glass sticky top-0 z-50 p-4 shadow-sm flex justify-between items-center px-6">
            <h2 class="font-bold text-purple-700 text-xl">📖 ท่าฉาง App</h2>
            <div class="flex items-center gap-4">
                <div id="points-display" class="bg-yellow-400 text-white px-5 py-1.5 rounded-full font-bold shadow-md">🪙 0 แต้ม</div>
                <button onclick="auth.signOut()" class="text-gray-400 hover:text-red-500 transition-colors">ทางออก</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-6">
            <section class="mb-10">
                <h2 class="text-2xl font-bold text-purple-800 mb-6 flex items-center gap-2">🔥 หนังสือมาแรง</h2>
                <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
            </section>

            <section>
                <h2 class="text-2xl font-bold text-purple-800 mb-6 flex items-center gap-2">🎁 แลกของรางวัล</h2>
                <div id="reward-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
            </section>
        </main>
    </div>

    <script>
        // 1. Firebase Config (ใช้ตัวเดิมของคุณที่ตั้งค่าไว้แล้ว)
        const firebaseConfig = {
            apiKey: "AIzaSyAR2-lI9YULz5J0OZNBcKk_oJYtJANX8XA",
            authDomain: "thachang-library.firebaseapp.com",
            databaseURL: "https://thachang-library-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "thachang-library",
            storageBucket: "thachang-library.firebasestorage.app",
            messagingSenderId: "172018694224",
            appId: "1:172018694224:web:e1c58a5836f849496db955"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const BOOKS = [
            { id: 'b1', title: 'ประวัติศาสตร์ท่าฉาง', icon: '🏛️', pts: 10, desc: 'เปิดตำนานเมืองท่าฉาง' },
            { id: 'b2', title: 'กะปิท่าฉางสูตรลับ', icon: '🦐', pts: 10, desc: 'หอม อร่อย ของดีบ้านเรา' }
        ];

        const REWARDS = [
            { id: 'r1', title: 'เกียรติบัตรนักอ่าน', cost: 50, icon: '📜' },
            { id: 'r2', title: 'สมุดบันทึกท่าฉาง', cost: 100, icon: '📓' }
        ];

        // 2. ระบบตรวจสอบสถานะ
        auth.onAuthStateChanged(user => {
            const loginScr = document.getElementById('login-screen');
            const mainScr = document.getElementById('main-screen');
            if (user) {
                loginScr.classList.add('hidden');
                mainScr.classList.remove('hidden');
                syncUserData(user.uid);
                renderApp();
            } else {
                loginScr.classList.remove('hidden');
                mainScr.classList.add('hidden');
            }
        });

        // 3. ซิงค์ข้อมูลแต้ม Realtime
        function syncUserData(uid) {
            db.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                window.userPoints = data ? (data.points || 0) : 0;
                document.getElementById('points-display').innerText = `🪙 ${window.userPoints} แต้ม`;
            });
        }

        // 4. ฟังก์ชันอ่านและแลก
        function updatePoints(amount, message) {
            const user = auth.currentUser;
            if (user) {
                const pointsRef = db.ref('users/' + user.uid + '/points');
                pointsRef.transaction((cp) => (cp || 0) + amount, (error, committed) => {
                    if (committed) alert(message);
                });
            }
        }

        function claimReward(cost, title) {
            if (window.userPoints >= cost) {
                updatePoints(-cost, `🎉 คุณแลก ${title} สำเร็จ!`);
            } else {
                alert("❌ แต้มไม่พอจ้า สะสมเพิ่มอีกนิดนะ!");
            }
        }

        // 5. แสดงผล UI
        function renderApp() {
            document.getElementById('book-grid').innerHTML = BOOKS.map(b => `
                <div class="glass p-6 rounded-3xl shadow-md text-center">
                    <div class="text-4xl mb-3">${b.icon}</div>
                    <h3 class="font-bold text-lg">${b.title}</h3>
                    <p class="text-gray-500 text-xs mb-4">${b.desc}</p>
                    <button onclick="updatePoints(${b.pts}, '📖 อ่านจบแล้ว รับ +${b.pts} แต้ม')" class="w-full bg-purple-100 text-purple-600 font-bold py-2 rounded-xl hover:bg-purple-200 transition">อ่านสะสมแต้ม</button>
                </div>
            `).join('');

            document.getElementById('reward-grid').innerHTML = REWARDS.map(r => `
                <div class="glass p-6 rounded-3xl shadow-md flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="text-3xl">${r.icon}</div>
                        <div>
                            <h3 class="font-bold text-sm">${r.title}</h3>
                            <p class="text-yellow-600 text-xs font-bold">ราคา ${r.cost} แต้ม</p>
                        </div>
                    </div>
                    <button onclick="claimReward(${r.cost}, '${r.title}')" class="bg-pink-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-pink-600 transition">แลกเลย</button>
                </div>
            `).join('');
        }

        // 6. ระบบสมัคร/ล็อกอิน
        async function handleRegister() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + res.user.uid).set({ points: 0, email: e });
                alert("สมัครสำเร็จ!");
            } catch (err) { alert(err.message); }
        }

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch (err) { alert("อีเมลหรือรหัสผ่านผิดจ้า"); }
        }
    </script>
</body>
</html>
